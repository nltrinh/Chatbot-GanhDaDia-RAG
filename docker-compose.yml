services:
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    container_name: ganh_da_dia_mongodb
    hostname: mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - mongodb_mongot:/data/mongot
    healthcheck:
      test: >
        mongosh --quiet --eval "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

volumes:
  mongodb_data:
  mongodb_config:
  mongodb_mongot:
